<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="940" aria-labelledby="title desc" role="img" viewBox="0 0 1600 940"><title id="title">GaitGuard Nexus Architecture Diagram</title><desc id="desc">End-to-end architecture from ESP32 sensors to explainable biomechanics engine and dataset export/upload.</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#e2e8f0"/></linearGradient><linearGradient id="ingest" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#dbeafe"/><stop offset="100%" stop-color="#bfdbfe"/></linearGradient><linearGradient id="engine" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#dcfce7"/><stop offset="100%" stop-color="#bbf7d0"/></linearGradient><linearGradient id="data" x1="0" x2="1" y1="0" y2="0"><stop offset="0%" stop-color="#ffedd5"/><stop offset="100%" stop-color="#fed7aa"/></linearGradient><marker id="arrow" markerHeight="8" markerWidth="8" orient="auto-start-reverse" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#334155" d="M 0 0 L 10 5 L 0 10 z"/></marker><style>.title{font:700 36px &apos;Segoe UI&apos;,Arial,sans-serif;fill:#0f172a}.subtitle{font:500 18px &apos;Segoe UI&apos;,Arial,sans-serif;fill:#334155}.group,.nodeTitle{font:700 22px &apos;Segoe UI&apos;,Arial,sans-serif;fill:#0f172a}.nodeTitle{font:700 19px &apos;Segoe UI&apos;,Arial,sans-serif}.nodeText{font:500 15px &apos;Segoe UI&apos;,Arial,sans-serif;fill:#334155}.file{font:600 14px Consolas,&apos;Courier New&apos;,monospace;fill:#1e293b}.arrowLabel{font:600 14px &apos;Segoe UI&apos;,Arial,sans-serif;fill:#334155}</style></defs><rect width="1600" height="940" x="0" y="0" fill="url(#bg)"/><text x="800" y="58" class="title" text-anchor="middle">GaitGuard Nexus Architecture</text><text x="800" y="88" class="subtitle" text-anchor="middle">Explainable sensor-to-decision pipeline for gait analytics</text><rect width="460" height="700" x="70" y="130" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" rx="24"/><text x="300" y="172" class="group" text-anchor="middle">Sensing and Transport</text><rect width="380" height="150" x="110" y="205" fill="url(#ingest)" stroke="#60a5fa" stroke-width="2" rx="18"/><text x="130" y="240" class="nodeTitle">ESP32 Insole Firmware</text><text x="130" y="270" class="nodeText">FSR (heel/inner/outer/toe), piezo, MPU6050</text><text x="130" y="296" class="nodeText">Outputs CSV serial and JSON WebSocket frames</text><text x="130" y="326" class="file">Firmware: Arduino sketch</text><rect width="380" height="130" x="110" y="385" fill="url(#ingest)" stroke="#60a5fa" stroke-width="2" rx="18"/><text x="130" y="420" class="nodeTitle">USB Serial Parser</text><text x="130" y="448" class="nodeText">Line parse, validation, noise line rejection</text><text x="130" y="478" class="file">src/utils/esp32Telemetry.ts</text><rect width="380" height="130" x="110" y="545" fill="url(#ingest)" stroke="#60a5fa" stroke-width="2" rx="18"/><text x="130" y="580" class="nodeTitle">WiFi WebSocket Ingest</text><text x="130" y="608" class="nodeText">Reconnect loop, JSON parse, status telemetry</text><text x="130" y="638" class="file">src/hooks/useSensorData.ts</text><rect width="380" height="95" x="110" y="705" fill="url(#ingest)" stroke="#60a5fa" stroke-width="2" rx="18"/><text x="130" y="742" class="nodeTitle">Unified RawSensorPacket</text><text x="130" y="770" class="nodeText">heel, inner, outer, toe, impact, pitch, roll, accZ</text><rect width="460" height="700" x="570" y="130" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2" rx="24"/><text x="800" y="172" class="group" text-anchor="middle">Explainable Biomechanics Core</text><rect width="380" height="560" x="610" y="215" fill="url(#engine)" stroke="#4ade80" stroke-width="2" rx="18"/><text x="630" y="250" class="nodeTitle">BiomechanicsEngine</text><text x="630" y="280" class="file">src/utils/biomechanicsEngine.ts</text><text x="630" y="322" class="nodeText">1) EMA filtering and pressure normalization</text><text x="630" y="352" class="nodeText">2) Contact detection and gait phase state machine</text><text x="630" y="382" class="nodeText">3) Heel-strike detection and step segmentation</text><text x="630" y="412" class="nodeText">4) Cadence from strike interval timing</text><text x="630" y="442" class="nodeText">5) COP weighted coordinate estimation</text><text x="630" y="472" class="nodeText">6) Stability score from sway and impact penalties</text><text x="630" y="502" class="nodeText">7) Anomaly and ischemic risk rules</text><text x="630" y="532" class="nodeText">8) Rolling history buffer for trend-aware flags</text><rect width="380" height="190" x="610" y="565" fill="#fff" stroke="#86efac" stroke-width="1.5" rx="14"/><text x="630" y="598" class="nodeTitle">Output Metrics</text><text x="630" y="626" class="nodeText">gaitPhase, cadenceSpm, stepCount</text><text x="630" y="652" class="nodeText">stabilityScore, stabilityBand, impactLevel</text><text x="630" y="678" class="nodeText">cop, mlpi, anomalyFlags, ischemicIntegralPct</text><text x="630" y="708" class="file">Bound in src/pages/MainDashboard.tsx</text><rect width="460" height="700" x="1070" y="130" fill="#fff7ed" stroke="#fdba74" stroke-width="2" rx="24"/><text x="1300" y="172" class="group" text-anchor="middle">UI, Storage, and Research Export</text><rect width="380" height="150" x="1110" y="205" fill="url(#data)" stroke="#fb923c" stroke-width="2" rx="18"/><text x="1130" y="240" class="nodeTitle">Dashboard and Controls</text><text x="1130" y="268" class="nodeText">Live telemetry cards, heatmap, trends, alerts</text><text x="1130" y="296" class="nodeText">Disease label + session/trial tagging controls</text><text x="1130" y="326" class="file">src/pages/MainDashboard.tsx</text><rect width="380" height="150" x="1110" y="385" fill="url(#data)" stroke="#fb923c" stroke-width="2" rx="18"/><text x="1130" y="420" class="nodeTitle">IndexedDB Dataset Store</text><text x="1130" y="448" class="nodeText">Batch writes, count, clear, CSV export</text><text x="1130" y="476" class="nodeText">Fields include diseaseLabel/sessionId/trialId</text><text x="1130" y="506" class="file">src/utils/telemetryDatasetStore.ts</text><rect width="380" height="150" x="1110" y="565" fill="url(#data)" stroke="#fb923c" stroke-width="2" rx="18"/><text x="1130" y="600" class="nodeTitle">Research Upload Utility</text><text x="1130" y="628" class="nodeText">Multipart CSV upload with metadata</text><text x="1130" y="656" class="nodeText">sampleCount, generatedAt, diseaseLabel</text><text x="1130" y="686" class="file">src/utils/researchUpload.ts</text><line x1="490" x2="610" y1="750" y2="750" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/><text x="525" y="738" class="arrowLabel">parsed frames</text><line x1="990" x2="1110" y1="640" y2="640" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/><text x="1010" y="628" class="arrowLabel">metrics and tags</text><line x1="1300" x2="1300" y1="355" y2="385" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/><line x1="1300" x2="1300" y1="535" y2="565" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/><text x="800" y="890" class="subtitle" text-anchor="middle">Deterministic pipeline: every clinical output maps to transparent rules and traceable source files.</text></svg>